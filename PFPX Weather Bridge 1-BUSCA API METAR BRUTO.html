<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PFPX Bridge - Google Drive Edition</title>
    <style>
        body { background: #050505; color: #d0d0d0; font-family: 'Consolas', monospace; padding: 20px; }
        .box { border: 1px solid #333; padding: 20px; background: #111; border-radius: 8px; max-width: 650px; margin: 0 auto; text-align: center; }
        input { background: #000; border: 1px solid #444; color: #00ff41; padding: 10px; font-size: 18px; width: 100px; text-align: center; margin-bottom: 10px; }
        button { background: #00ff41; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .res-line { background: #000; padding: 15px; border-left: 4px solid #00ff41; margin-top: 20px; min-height: 20px; word-break: break-all; }
        .tag { font-size: 10px; padding: 2px 6px; border-radius: 3px; background: #1b4332; color: #74c69d; margin-bottom: 5px; display: inline-block; }
    </style>
</head>
<body>
    <div class="box">
        <h3>PFPX WEATHER BRIDGE</h3>
        <input type="text" id="icao" placeholder="SBCX" maxlength="4">
        <br>
        <button id="btn">SINCRONIZAR METAR</button>
        <div id="badge"></div>
        <div id="output" class="res-line">Aguardando comando...</div>
    </div>

    <script>
        const proxy = "https://api.allorigins.win/raw?url=";
        const nearestConfig = { "SBCX": "SBPA", "SBNM": "SBSM", "SBTD": "SBCT" };

        async function fetchMetar(icao, isFallback = false) {
            const out = document.getElementById('output');
            const badge = document.getElementById('badge');
            out.innerText = "Buscando dados...";

            try {
                // Tenta NOAA (Principal)
                let url = `https://aviationweather.gov/api/data/metar?ids=${icao}&format=raw&ts=${Date.now()}`;
                let res = await fetch(proxy + encodeURIComponent(url));
                let data = await res.text();

                if (data && data.length > 15 && !data.includes("error")) {
                    badge.innerHTML = '<span class="tag">NOAA OK</span>';
                    let clean = data.split('\n')[0].replace(/=/g, "").trim();
                    out.innerText = clean;
                    return;
                }

                // Tenta REDEMET (Secundário)
                let urlRede = `https://www.redemet.aer.mil.br/api/consulta_automatica/index.php?local=${icao}&msg=metar`;
                let resRed = await fetch(proxy + encodeURIComponent(urlRede));
                let dataRed = await resRed.text();
                let cleanRede = dataRed.replace(/<[^>]*>?/gm, '').replace(/\s+/g, ' ').trim();

                if (cleanRede.length > 15 && !cleanRede.includes("não localizada")) {
                    badge.innerHTML = '<span class="tag">REDEMET OK</span>';
                    out.innerText = cleanRede;
                    return;
                }

                // Tenta Aeroporto Vizinho
                if (!isFallback && nearestConfig[icao]) {
                    badge.innerHTML = `<span class="tag">VIA ${nearestConfig[icao]}</span>`;
                    return fetchMetar(nearestConfig[icao], true);
                }

                out.innerText = "METAR não encontrado nas fontes.";
            } catch (e) {
                out.innerText = "Erro de conexão. Verifique o acesso ao Drive.";
            }
        }

        document.getElementById('btn').onclick = () => {
            fetchMetar(document.getElementById('icao').value.toUpperCase().trim());
        };
    </script>
</body>
</html>
