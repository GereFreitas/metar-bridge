<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>METAR Bridge Direto</title>
    <style>
        body { background: #121212; color: #eee; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 8px; width: 400px; text-align: center; }
        input { padding: 10px; width: 80px; font-size: 16px; text-transform: uppercase; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        #output { margin-top: 20px; padding: 15px; background: #000; color: #0f0; border: 1px solid #333; word-break: break-all; text-align: left; }
    </style>
</head>
<body>
    <div class="box">
        <h3>BUSCADOR METAR</h3>
        <input type="text" id="icao" placeholder="SBCX" maxlength="4">
        <button onclick="buscarMetar()">OK</button>
        <div id="output">Insira o ICAO e clique em OK</div>
    </div>

<script>
    function buscarMetar() {
        const icao = document.getElementById('icao').value.toUpperCase();
        if (icao.length !== 4) { alert("ICAO inválido"); return; }

        // Tenta a NOAA (Internacional)
        const urlNOAA = `https://aviationweather.gov/api/data/metar?ids=${icao}&format=raw`;
        
        // Se a NOAA falhar, você pode usar este link da REDEMET abaixo
        // Como o navegador bloqueia o fetch, você pode simplesmente clicar 
        // neste link se o primeiro não retornar nada:
        const urlREDEMET = `https://www.redemet.aer.mil.br/api/consulta_automatica/index.php?local=${icao}&msg=metar`;

        // Vamos abrir a NOAA, mas deixamos o link da REDEMET pronto na página
        window.open(urlNOAA, '_blank');
        
        document.getElementById('output').innerHTML = 
            `Tentando buscar: ${icao}<br><br>` +
            `<a href="${urlREDEMET}" target="_blank" style="color: #00ff41;">` +
            `Se a aba acima estiver vazia, clique aqui para buscar na REDEMET (Brasil)` +
            `</a>`;
    }
</script>
</body>
</html>
