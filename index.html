<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>METAR Bridge Direto</title>
    <style>
        body { background: #121212; color: #eee; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 8px; width: 400px; text-align: center; }
        input { padding: 10px; width: 80px; font-size: 16px; text-transform: uppercase; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        #output { margin-top: 20px; padding: 15px; background: #000; color: #0f0; border: 1px solid #333; word-break: break-all; text-align: left; }
    </style>
</head>
<body>
    <div class="box">
        <h3>BUSCADOR METAR</h3>
        <input type="text" id="icao" placeholder="SBCX" maxlength="4">
        <button onclick="buscarMetar()">OK</button>
        <div id="output">Insira o ICAO e clique em OK</div>
    </div>

    <script>
        async function buscarMetar() {
            const icao = document.getElementById('icao').value.toUpperCase();
            const out = document.getElementById('output');
            
            if (icao.length !== 4) {
                out.innerText = "Por favor, digite um ICAO válido.";
                return;
            }

            out.innerText = "Buscando...";

            try {
                // A URL direta da NOAA que você validou que funciona no navegador
                const url = `https://aviationweather.gov/api/data/metar?ids=${icao}&format=raw`;
                
                const response = await fetch(url);
                
                if (!response.ok) throw new Error("Erro ao acessar servidor");
                
                const data = await response.text();
                
                if (data.trim().length > 0) {
                    out.innerText = data.trim();
                } else {
                    out.innerText = "METAR não encontrado para este ICAO.";
                }
            } catch (err) {
                out.innerText = "Erro: " + err.message;
            }
        }
    </script>
</body>
</html>
